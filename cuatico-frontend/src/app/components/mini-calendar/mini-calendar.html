<div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 overflow-hidden w-full max-w-full sm:max-w-xs md:max-w-sm"
     [ngClass]="{
       'transform hover:scale-[1.02]': size === 'large',
       'transform hover:scale-[1.01]': size === 'small'
     }"
     style="box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);">
    <!-- Efecto de brillo en la esquina superior izquierda -->
    <div class="absolute top-0 left-0 w-6 h-6 sm:w-8 sm:h-8 bg-gradient-to-br from-primario/30 to-transparent rounded-tl-lg z-0"></div>
    <!-- Contenedor con animación de transición para cambio de mes -->
    <!-- Cabecera del calendario (versión más compacta y responsive) -->
    <div class="flex items-center justify-between p-1.5 sm:p-2 bg-primario text-white dark:bg-primario/90 border-b border-primario/20 dark:border-primario/30 relative z-10">
        <!-- Botón mes anterior -->
        <button (click)="cambiarMes(-1)" 
                class="p-1 sm:p-1.5 rounded-full hover:bg-white/20 dark:hover:bg-white/30 focus:outline-none focus:ring-0 focus:ring-primario/50 dark:focus:ring-secundario/50 transition-all duration-200 transform hover:scale-105">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-3.5 sm:w-3.5 text-white dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        
        <!-- Título del mes y año con botón para ir al mes actual -->
        <div class="flex items-center space-x-1.5 sm:space-x-2.5">
            <span class="text-xs sm:text-sm font-semibold">{{ meses[mesActual] }} {{ anioActual }}</span>
            <button (click)="irAlMesActual()" 
                    class="px-1.5 py-0.5 text-[10px] sm:text-xs bg-white/20 dark:bg-white/30 hover:bg-white/30 dark:hover:bg-white/40 rounded-md text-white dark:text-white font-medium transition-all duration-200 transform hover:scale-105 focus:outline-none focus:ring-0 focus:ring-white/50 dark:focus:ring-white/50">
                Hoy
            </button>
        </div>
        
        <!-- Botón mes siguiente -->
        <button (click)="cambiarMes(1)" 
                class="p-1 sm:p-1.5 rounded-full hover:bg-white/20 dark:hover:bg-white/30 focus:outline-none focus:ring-0 focus:ring-white/50 dark:focus:ring-white/50 transition-all duration-200 transform hover:scale-105">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-3.5 sm:w-3.5 text-white dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

    <!-- Días de la semana (versión más compacta y responsive) -->
    <div class="grid grid-cols-7 gap-0 p-0.5 bg-gray-50 dark:bg-gray-800/80 border-b border-gray-200 dark:border-gray-700 shadow-inner">
        @for (dia of diasSemana; track $index) {
        <div class="text-center text-[9px] sm:text-xs font-semibold py-0.5 uppercase tracking-wider transition-all duration-200 rounded-md"
             [ngClass]="{
               'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50': $index < 5,
               'text-primario dark:text-secundario font-bold hover:bg-primario/5 dark:hover:bg-secundario/10': $index === 5 || $index === 6
             }">
             <span class="inline-block transform transition-transform hover:scale-105">{{ dia }}</span>
        </div>
        }
    </div>

    <!-- Días del mes con mejor interactividad y efectos visuales (optimizado para reducir espacio) -->
    <div class="grid grid-cols-7 gap-0 p-0.5 sm:p-1 bg-white dark:bg-gray-800/90 rounded-b-lg" 
         [ngClass]="{'opacity-0 transform scale-95': animacionCambioMes, 'opacity-100 transform scale-100': !animacionCambioMes}"
         style="transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);">
        @for (dia of dias; track $index) {
        <button (click)="seleccionarDia(dia)" 
               class="group relative flex flex-col items-center justify-center h-6 sm:h-7 cursor-pointer rounded-sm transition-all duration-300 transform hover:scale-105 hover:shadow-sm focus:outline-none focus:ring-0 focus:ring-primario/50 dark:focus:ring-secundario/50"
               [ngClass]="{
                 'hover:bg-primario/10 dark:hover:bg-primario/20 hover:z-10': dia.esDelMesActual,
                 'text-gray-300 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 opacity-60 scale-90 hover:opacity-80': !dia.esDelMesActual,
                 'bg-primario/20 dark:bg-primario/30 font-bold ring-0 ring-primario/30 dark:ring-secundario/30 shadow-inner': esDiaActual(dia),
                 'ring-0 ring-primario dark:ring-secundario shadow-md scale-105': diaSeleccionado === dia,
                 'font-semibold': dia.esDelMesActual && !esDiaActual(dia)
               }"
               [attr.aria-label]="'Día ' + dia.fecha.getDate() + ' de ' + meses[dia.fecha.getMonth()] + ' de ' + dia.fecha.getFullYear() + (esDiaActual(dia) ? ' (Hoy)' : '') + (dia.tieneEvento ? ', tiene eventos' : '') + (tieneNotas(dia) ? ', tiene notas' : '')"
               [attr.aria-current]="esDiaActual(dia) ? 'date' : null"
               [attr.aria-selected]="diaSeleccionado === dia">
            <span class="text-[9px] sm:text-xs transition-all duration-200 group-hover:font-bold" 
                  [ngClass]="{
                    'animate-pulse text-primario dark:text-secundario': esDiaActual(dia)
                  }">{{ dia.fecha.getDate() }}</span>
            <!-- Indicadores mejorados para eventos y notas (más compactos) -->
            <div class="absolute bottom-0 flex space-x-0">
                @if (dia.tieneEvento) {
                <span class="w-0.5 h-0.5 bg-primario dark:bg-secundario rounded-full animate-pulse shadow-sm group-hover:scale-150 transition-transform duration-300" 
                      title="Tiene eventos"></span>
                }
                @if (tieneNotas(dia)) {
                <span class="w-0.5 h-0.5 bg-yellow-400 dark:bg-yellow-300 rounded-full shadow-sm group-hover:scale-150 transition-transform duration-300" 
                      title="Tiene notas"></span>
                }
            </div>
        </button>
        }
    </div>



    <!-- Se ha eliminado el pie del calendario -->
</div>
