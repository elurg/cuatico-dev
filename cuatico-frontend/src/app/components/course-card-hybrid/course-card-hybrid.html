<app-card 
  [hover]="true" 
  [clickable]="true" 
  [padding]="'none'" 
  [rounded]="'lg'" 
  (click)="onNavigate()">
  
  <!-- Imagen del curso -->
  <div class="relative">
    <img [src]="course.thumbnail || 'assets/curso.avif'" 
         [alt]="course.titulo" 
         class="w-full h-40 object-cover rounded-t-lg group-hover:scale-105 transition-transform duration-300">
    
    <!-- Etiqueta combinada de modalidad y precio -->
    <div class="absolute top-3 right-3">
      <app-badge
        [rounded]="true"
        [variant]="course.modalidad"
        [isRecommended]="!showProgress"
        [customClass]="!showProgress ? 'bg-yellow-400 text-yellow-800' : undefined">
        {{ getPriceModalidadText() }}
      </app-badge>
    </div>
  </div>

  <!-- Contenido de la tarjeta -->
  <div class="p-5">
    
    <!-- Título del curso -->
    <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors">
      {{ course.titulo }}
    </h3>

    <!-- Información del profesor -->
    <div class="flex items-center mb-3">
      <app-avatar 
        [src]="'assets/Diana.png'" 
        [alt]="course.profesor" 
        size="xs" 
        [border]="true"
        [rounded]="true"
        [fallbackText]="course.profesor">
      </app-avatar>
      <span class="ml-2 text-sm text-gray-600">Por {{ course.profesor }}</span>
    </div>

    <!-- No mostramos barra de progreso por defecto -->

    <!-- Información del curso con iconos -->
    <div class="space-y-2 mb-3">
      @if (course.lecciones) {
        <div class="flex items-center text-sm text-gray-600">
          <app-icon name="fas fa-book" size="sm" color="purple-500" class="mr-2"></app-icon>
          <span>{{ course.lecciones }}</span>
        </div>
      }
      
      @if (course.duracion) {
        <div class="flex items-center text-sm text-gray-600">
          <app-icon name="fas fa-clock" size="sm" color="blue-500" class="mr-2"></app-icon>
          <span>{{ course.duracion }}</span>
        </div>
      }
      
      @if (course.fecha) {
        <div class="flex items-center text-sm text-gray-600">
          <app-icon name="fas fa-calendar" size="sm" color="green-500" class="mr-2"></app-icon>
          <span>{{ course.fecha }}</span>
        </div>
      }
    </div>

    <!-- Botón de acción -->
    <div class="mt-4">
      @if (showProgress) {
        <app-button 
          variant="primary" 
          [fullWidth]="true" 
          (clicked)="onNavigate()">
          Continuar Curso
        </app-button>
      } @else {
        <app-button 
          variant="primary" 
          [fullWidth]="true" 
          (clicked)="onEnroll()">
          Comprar Curso
        </app-button>
      }
    </div>
  </div>
</app-card>
