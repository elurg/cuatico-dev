<!-- Caso especial: checkbox (siempre horizontal, independiente del modo) -->
@if (type === 'checkbox') {
  <label class="flex items-center gap-3 text-primario cursor-pointer w-full">
    <input type="checkbox" [id]="id" [required]="required" [checked]="model" (change)="onCheckboxChange($event)"
      class="sr-only peer">
    <span
      class="shrink-0 relative flex items-center justify-center w-5 h-5 border-2 border-primario rounded peer-checked:bg-primario peer-checked:border-primario">
      <svg class="absolute w-5 h-5 text-white peer-checked:opacity-100" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </span>
    <span>{{ label }}</span>
  </label>
}

<!-- Caso especial: select -->
@if (type === 'select') {
  <div [class]="horizontal ? 'flex items-center gap-x-2' : 'w-full'">
    <label [for]="id" [class]="horizontal ? 'text-sm/6 font-medium text-primario shrink-0' : 'block text-sm/6 font-medium text-primario mb-1'">
      {{ label }}
      @if (required) { <span class="required text-red-600">*</span> }
    </label>
    <div [class]="horizontal ? 'relative flex-1' : 'relative mt-2'">
      <button (click)="toggleSelect()"
        class="w-full rounded-md border border-primario/30 bg-white px-3 py-1.5 text-primario focus:outline-2 focus:outline-offset-2 focus:outline-primario sm:text-sm/6 flex items-center justify-between">
        {{ selectedOption || (placeholder || 'Selecciona una opción') }}
        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      @if (isSelectOpen) {
        <ul class="absolute z-10 mt-1 w-full rounded-md border border-primario/30 bg-white shadow-lg">
          @if (options) {
            @for (option of options; track option) {
              <li class="px-3 py-2">
                <button (click)="selectOption(option)" (keydown.enter)="selectOption(option)"
                  (keydown.space)="selectOption(option)"
                  class="w-full text-left px-3 py-2 hover:bg-primario/10 cursor-pointer text-primario">
                  {{ option }}
                </button>
              </li>
            }
          }
        </ul>
      }
    </div>
  </div>
}

<!-- Caso para textarea y tipos de input normales -->
@if (type !== 'checkbox' && type !== 'select') {
  @if (type === 'textarea') {
    <div [class]="horizontal ? 'flex items-center gap-x-2' : 'w-full'">
      <label [for]="id" [class]="horizontal ? 'text-sm/6 font-medium text-primario shrink-0' : 'block text-sm/6 font-medium text-primario mb-1'">
        {{ label }}
        @if (required) { <span class="required text-red-600">*</span> }
      </label>
      <textarea 
        [id]="id" 
        [placeholder]="placeholder" 
        [required]="required" 
        [value]="model" 
        [disabled]="disabled"
        [readonly]="readonly"
        (input)="onInput($any($event.target).value)"
        [class]="horizontal ? 'flex-1 rounded-md border border-primario/30 bg-white px-3 py-1.5 text-primario placeholder:text-gray-400 focus:outline-2 focus:outline-offset-2 focus:outline-primario sm:text-sm/6' : 'block w-full rounded-md border border-primario/30 bg-white px-3 py-1.5 text-primario placeholder:text-gray-400 focus:outline-2 focus:outline-offset-2 focus:outline-primario sm:text-sm/6'">
      </textarea>
    </div>
  } @else {
    <!-- Usar el nuevo componente Input para los tipos de input normales -->
    <app-input
      [type]="currentInputType"
      [label]="horizontal ? '' : label"
      [placeholder]="placeholder"
      [required]="required"
      [disabled]="disabled"
      [readonly]="readonly"
      [hint]="hint"
      [error]="error"
      [fullWidth]="true"
      [(ngModel)]="model"
      [icon]="type === 'password' ? passwordIcon : undefined"
      [iconPosition]="'right'"
      (iconClick)="onIconClick()"
      (cleared)="onInput('')"
      (ngModelChange)="onInput($event)">
    </app-input>
    
    <!-- Si es horizontal, añadir la etiqueta manualmente -->
    @if (horizontal) {
      <div class="flex items-center gap-x-2">
        <label [for]="id" class="text-sm/6 font-medium text-primario shrink-0">
          {{ label }}
          @if (required) { <span class="required text-red-600">*</span> }
        </label>
        <app-input
          [type]="currentInputType"
          [placeholder]="placeholder"
          [required]="required"
          [disabled]="disabled"
          [readonly]="readonly"
          [hint]="hint"
          [error]="error"
          [fullWidth]="true"
          [(ngModel)]="model"
          [icon]="type === 'password' ? passwordIcon : undefined"
          [iconPosition]="'right'"
          (iconClick)="onIconClick()"
          (cleared)="onInput('')"
          (ngModelChange)="onInput($event)">
        </app-input>
      </div>
    }
  }
}
