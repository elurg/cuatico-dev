<main class="grid grid-cols-3 grid-rows-[auto_auto] gap-4 p-4 items-start">


    <!-- Frase + Estadísticas (fila 1, columnas 1-2) -->
    <div class="col-span-2 row-start-1">
        <!-- Frase motivadora -->
        <div class="flex justify-center p-4">
            <p>Frase super motivadora</p>
        </div>

        <!-- Estadísticas -->
        <div class="flex justify-center m-4">
            <div
                class="flex flex-row justify-center  bg-gradient-to-r from-primario to-primario/80 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                <app-user-stats
                    [stats]="{ completedLessons: '5/7', studyTime: '2.5h', overallProgress: '85%'}"></app-user-stats>
            </div>
        </div>
    </div>

    <!-- Insignias y Ranking (fila 2, columnas 1-2) -->
    <div class="col-span-2 row-start-2 flex gap-8 justify-center">
        <div class="border-2 border-secundario rounded-lg w-56 h-56 flex justify-center items-center">
            <p>Puesto ranking</p>
        </div>
        <div class="border-2 border-secundario rounded-lg w-56 h-56 flex justify-center items-center">
            <p>Insignias</p>
        </div>
    </div>

    <!-- Perfil (fila 1, columna 3) -->
    <div
        class="relative flex flex-col justify-start items-center border-2 border-secundario rounded-lg p-4 col-start-3 row-start-1">

        <!-- Icono lápiz -->
        <a href="/editar-perfil" class="absolute top-4 right-4 text-secundario hover:text-secundario/80 transition"
            aria-label="Editar perfil">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21H3v-3.5L16.732 3.732z" />
            </svg>
        </a>

        <div class="w-full text-center">
            <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Foto de perfil"
                class="w-40 h-40 mx-auto rounded-full object-cover border-4 border-secundario mb-2" />
            <p class="text-base font-medium text-gray-800">{{ '@' + user.username }}</p>
            <p class="text-base font-medium text-gray-800 text-left">Nombre: {{ user.name }}</p>
            <p class="text-base font-medium text-gray-800 text-left">Apellidos: {{ user.surnames }}</p>
            <p class="text-base font-medium text-gray-800 text-left">Email: {{ user.email }}</p>
            <p class="text-base font-medium text-gray-800 text-left">Teléfono: {{ user.phone }}</p>
        </div>

    </div>

    <!-- Solicita una tutoría (fila 2, columna 3) -->
    <div
        class="flex flex-col justify-start items-center border-2 border-secundario rounded-lg p-4 col-start-3 row-start-2">
        <p class="text-sm text-gray-700">Tu experiencia de aprendizaje es única. Estamos contigo.</p>
        <button class="bg-secundario rounded-md text-white mt-2 px-4 py-2 hover:bg-secundario/90 transition">
            Solicita una tutoría
        </button>
        <a href="#" class="mt-2 inline-block text-primario underline hover:text-primario/80 transition-colors">Preguntas
            frecuentes</a>
    </div>

</main>
