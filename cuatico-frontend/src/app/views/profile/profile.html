<main class="grid grid-cols-3 grid-rows-[auto_auto] gap-6 p-6 bg-slate-50 min-h-screen">

  <!-- Frase motivadora (fila 1, columnas 1-2) -->
  <div class="col-span-2 row-start-1 flex flex-col gap-6">
    <!-- Frase -->
    <div class="flex justify-center items-center border-2 border-secundario bg-white shadow-lg rounded-xl p-6 h-44">
      <p class="text-5xl md:text-7xl font-bold text-primario text-center">Oso ondo ta profundo</p>
    </div>

    <!-- Estadísticas -->
    <div class="flex justify-center border-2 border-secundario shadow-lg rounded-xl p-6 bg-primario text-white">
      <div class="w-full max-w-3xl">
        <app-user-stats
          [stats]="{ completedLessons: '5/7', studyTime: '2.5h', overallProgress: '85%'}">
        </app-user-stats>
      </div>
    </div>
  </div>

  <!-- Insignias y Ranking (fila 2, columnas 1-2) -->
  <div class="col-span-2 row-start-2 flex gap-6 justify-center items-stretch h-full">
    <!-- Ranking -->
    <div class="flex-1 border-2 border-secundario shadow-lg rounded-xl flex flex-col justify-center items-center p-6 bg-white">
      <p class="font-semibold text-xl text-center text-slate-700">Puesto ranking</p>
    </div>

    <!-- Insignias -->
    <div class="flex-1 border-2 border-secundario shadow-lg rounded-xl flex flex-col justify-center items-center p-6 bg-white">
      <p class="font-semibold text-xl text-center text-slate-700">Insignias</p>
    </div>
  </div>

  <!-- Perfil (fila 1, columna 3) -->
  <div class="relative flex flex-col justify-start items-center border-2 border-secundario rounded-xl shadow-lg p-6 h-full col-start-3 row-start-1 bg-white">
    <!-- Icono lápiz -->
    <a href="/editar-perfil" class="absolute top-4 right-4 text-secundario hover:text-secundario/80 transition" aria-label="Editar perfil">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21H3v-3.5L16.732 3.732z" />
      </svg>
    </a>

    <!-- Datos perfil -->
    <div class="w-full text-center rounded-lg p-4">
      <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Foto de perfil"
           class="w-36 h-36 md:w-40 md:h-40 mx-auto rounded-full object-cover border-4 border-secundario mb-4 shadow" />
      <p class="text-lg font-semibold text-primario mb-2">{{ '@' + user.username }}</p>
      <div class="flex flex-col gap-2">
        <p class="text-base font-medium text-slate-700 text-left"><strong>Nombre:</strong> {{ user.name }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Apellidos:</strong> {{ user.surnames }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Email:</strong> {{ user.email }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Teléfono:</strong> {{ user.phone }}</p>
      </div>
    </div>
  </div>

  <!-- Solicita una tutoría (fila 2, columna 3) -->
  <div class="flex flex-col gap-8 justify-center items-center h-full text-center border-2 border-secundario bg-white shadow-lg rounded-xl p-6 col-start-3 row-start-2">
    <p class="text-base text-slate-700 leading-relaxed">
      <strong class="text-primario">¿Necesitas ayuda?</strong><br>
      Tu experiencia de aprendizaje es única. Estamos aquí para acompañarte.
    </p>
    <button (click)="solicitarTutoria()" class="bg-primario rounded-md text-white px-4 py-2">Solicita una
                tutoría
              </button>
    <a routerLink="/faq" class="text-base text-primario font-medium underline hover:text-primario/80 transition">
      Preguntas frecuentes
    </a>
  </div>
</main>
