<main class="grid grid-cols-3 grid-rows-[auto_auto] gap-4 p-4 items-start min-h-screen">

  <!-- Frase motivadora (fila 1, columnas 1-2) -->
  <div class="col-span-2 row-start-1 flex flex-col gap-4">
    <!-- Frase -->
    <div class="flex justify-center items-center border-2 border-secundario shadow-md rounded-lg p-4 h-44">
      <p class="text-7xl">Oso ondo ta profundo</p>
    </div>

    <!-- Estadísticas -->
    <div class="flex justify-center border-2 border-secundario shadow-md rounded-lg p-6 bg-primario text-white">
      <div class="w-full max-w-3xl">
        <app-user-stats
          [stats]="{ completedLessons: '5/7', studyTime: '2.5h', overallProgress: '85%'}">
        </app-user-stats>
      </div>
    </div>
  </div>

  <!-- Insignias y Ranking (fila 2, columnas 1-2) -->
  <div class="col-span-2 row-start-2 flex gap-4 justify-center items-stretch h-full">
    <!-- Ranking -->
    <div class="flex-1 border-2 border-secundario shadow-md rounded-lg flex justify-center items-center p-4 bg-white">
      <p class="font-semibold text-center text-slate-700">Puesto ranking</p>
    </div>

    <!-- Insignias -->
    <div class="flex-1 border-2 border-secundario shadow-md rounded-lg flex justify-center items-center p-4 bg-white">
      <p class="font-semibold text-center text-slate-700">Insignias</p>
    </div>
  </div>

  <!-- Perfil (fila 1, columna 3) -->
  <div class="relative flex flex-col justify-start items-center border-2 border-secundario rounded-lg shadow-md p-4 h-full col-start-3 row-start-1">
    <!-- Icono lápiz -->
    <a href="/editar-perfil" class="absolute top-4 right-4 text-secundario hover:text-secundario/80 transition" aria-label="Editar perfil">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21H3v-3.5L16.732 3.732z" />
      </svg>
    </a>

    <!-- Datos perfil -->
    <div class="w-full text-center rounded-lg p-4">
      <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Foto de perfil"
           class="w-40 h-40 mx-auto rounded-full object-cover border-4 border-secundario mb-4" />
      <p class="text-lg font-semibold text-primario mb-4">{{ '@' + user.username }}</p>
      <div class="flex flex-col gap-3">
        <p class="text-base font-medium text-slate-700 text-left"><strong>Nombre:</strong> {{ user.name }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Apellidos:</strong> {{ user.surnames }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Email:</strong> {{ user.email }}</p>
        <p class="text-base font-medium text-slate-700 text-left"><strong>Teléfono:</strong> {{ user.phone }}</p>
      </div>
    </div>
  </div>

  <!-- Solicita una tutoría (fila 2, columna 3) -->
  <div class="flex flex-col gap-8 justify-center items-center h-full text-center border-2 border-secundario bg-white shadow-md rounded-xl p-6 col-start-3 row-start-2">
    <p class="text-sm text-slate-700 leading-relaxed">
      <strong class="text-primario">¿Necesitas ayuda?</strong><br>
      Tu experiencia de aprendizaje es única. Estamos aquí para acompañarte.
    </p>
    <button class="bg-secundario text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-secundario/90 transition-colors shadow">
      Solicita una tutoría
    </button>
    <a href="#" class="text-sm text-primario font-medium underline hover:text-primario/80 transition">
      Preguntas frecuentes
    </a>
  </div>
</main>
