<!-- Fondo y canvas -->
<div
  class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-[#0d1b2a] via-[#1b263b] to-[#0d47a1]">
  <canvas #starCanvas class="absolute inset-0 pointer-events-none z-0"></canvas>

  <!-- Contenedor blanco con formulario e imagen -->
  <div class="flex w-full max-w-4xl rounded-2xl overflow-hidden shadow-lg bg-white relative z-10 m-4">
    <!-- Formulario (izquierda) -->
    <div class="w-full md:w-1/2">
      <!-- Título y texto bonito -->
      <div class="bg-primario p-8 text-white text-center">
        <img src="assets/logop.avif" alt="Logo Cuático" class="h-8 w-auto mx-auto mb-4">
        <h2 class="text-3xl font-bold mb-2">Crea tu cuenta</h2>
        <p class="text-sm italic text-indigo-200">
          Únete a nosotros y comienza tu viaje hoy. ¡Solo toma un minuto!
        </p>
      </div>

      <!-- Formulario -->
      <div class="p-10">
        <form (ngSubmit)="onRegister()">
          <app-label-input label="Nombre completo" id="name" type="text" placeholder="Nombre" [(model)]="formData.name"
            [required]="true"></app-label-input>
          <app-label-input label="Correo electrónico" id="email" type="email" placeholder="tucorreo@ejemplo.com"
            [(model)]="formData.email" [required]="true"></app-label-input>
          <app-label-input label="Contraseña" id="password" type="password" placeholder="••••••••"
            [(model)]="formData.password" [required]="true"></app-label-input>
          <app-label-input label="Confirmar contraseña" id="confirm-password" type="password" placeholder="••••••••"
            [(model)]="formData.confirmPassword" [required]="true"></app-label-input>
          <app-label-input label="Usuario" id="username" type="text" placeholder="Usuario" [(model)]="formData.username"
            [required]="true"></app-label-input>
          <app-label-input label="Teléfono" id="phone" type="text" placeholder="Teléfono"
            [(model)]="formData.phone"></app-label-input>
          <button type="submit" class="w-full ...">Crear cuenta</button>
        </form>


        <p class="mt-6 text-sm text-center text-gray-600">
          ¿Ya tienes una cuenta?
          <a routerLink="/login" class="text-primario hover:underline">Inicia sesión</a>
        </p>
      </div>
    </div>

    <!-- Imagen lateral (derecha) con overlay azul -->
    <div class="relative hidden md:block w-1/2">
      <img src="assets/register-image.jpg" alt="Lateral de registro" class="h-full w-full object-cover" />
      <div class="absolute inset-0 bg-primario bg-opacity-60"></div>
    </div>

  </div>
</div>
