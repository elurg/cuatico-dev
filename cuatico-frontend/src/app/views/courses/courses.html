<div class="min-h-[90vh] flex flex-col bg-gray-50">
  <div class="flex-1 overflow-auto">
    <div class="px-4 sm:px-8 py-6 sm:py-10 max-w-7xl mx-auto">
      <!-- Cabecera personalizada con doodle -->
      <div class="relative bg-gradient-to-br from-blue-50 to-teal-50 rounded-3xl p-8 mb-8 overflow-hidden">
        <!-- Elementos decorativos de fondo -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
          <!-- Círculos decorativos -->
          <div class="absolute top-4 left-8 w-16 h-16 bg-gradient-to-br from-indigo-200 to-blue-300 rounded-full opacity-30 animate-pulse"></div>
          <div class="absolute top-12 right-12 w-12 h-12 bg-gradient-to-br from-teal-200 to-cyan-300 rounded-full opacity-40"></div>
          <div class="absolute bottom-8 left-16 w-8 h-8 bg-gradient-to-br from-purple-200 to-indigo-300 rounded-full opacity-35"></div>
          <div class="absolute bottom-4 right-20 w-20 h-20 bg-gradient-to-br from-blue-100 to-teal-200 rounded-full opacity-25"></div>
          
          <!-- Líneas onduladas decorativas -->
          <svg class="absolute top-0 right-0 w-32 h-32 text-indigo-200 opacity-30" viewBox="0 0 100 100" fill="none">
            <path d="M10 50 Q 30 20, 50 50 T 90 50" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M20 30 Q 40 10, 60 30 T 100 30" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
          
          <svg class="absolute bottom-0 left-0 w-28 h-28 text-teal-200 opacity-25" viewBox="0 0 100 100" fill="none">
            <path d="M0 70 Q 20 50, 40 70 T 80 70" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M10 90 Q 30 70, 50 90 T 90 90" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        
        <!-- Contenido principal -->
        <div class="relative z-10 flex flex-col items-center text-center">
          <!-- Icono profesional minimalista -->
          <div class="flex items-center justify-center mb-6">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-teal-500 rounded-xl flex items-center justify-center shadow-lg">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
            </div>
          </div>
          
          <!-- Título principal con estilo doodle -->
          <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-600 via-purple-600 to-teal-600 bg-clip-text text-transparent mb-2">
            Mis Cursos
          </h1>
          
          <!-- Subtítulo decorativo -->
          <div class="flex items-center justify-center gap-2 mb-2">
            <p class="text-gray-600 text-sm sm:text-base">Tu camino hacia el conocimiento</p>
          </div>
          
          <!-- Elementos flotantes adicionales -->
          <div class="absolute top-2 left-4">
            <svg class="w-6 h-6 text-purple-300 animate-bounce" style="animation-delay: 0.5s" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          
          <div class="absolute top-6 right-8">
            <svg class="w-5 h-5 text-teal-300 animate-ping" style="animation-delay: 1s" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Grid de cursos -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
        <div class="col-span-1" *ngFor="let curso of misCursos">
          <app-course-card-hybrid
            [course]="curso"
            [showProgress]="true"
            [showPrice]="false"
            (navigate)="onNavigateToCourse($event)"
            (enroll)="onEnrollInCourse($event)">
          </app-course-card-hybrid>
        </div>
      </div>
    </div>
  </div>
</div>
